<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão Prev — Consolidador de Balancetes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0c0f1a;
  --surface: #141828;
  --surface2: #1b2038;
  --border: #262d4a;
  --text: #e2e6f0;
  --text2: #8890aa;
  --accent: #4f8cff;
  --accent2: #36d6a8;
  --accent3: #ff6b8a;
  --gold: #f0c040;
  --red: #ff5757;
  --green: #36d6a8;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header {
  background: linear-gradient(135deg, #1a1f3a 0%, #0c0f1a 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display:flex; align-items:center; gap:20px;
}
.header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.header h1 span { color:var(--accent); }
.header .badge {
  background:var(--accent);
  color:#000;
  font-size:11px;
  font-weight:700;
  padding:3px 10px;
  border-radius:20px;
  letter-spacing:0.5px;
}

.controls {
  display:flex; gap:12px; padding:16px 32px; flex-wrap:wrap; align-items:end;
  background:var(--surface); border-bottom:1px solid var(--border);
}
.control-group { display:flex; flex-direction:column; gap:4px; }
.control-group label { font-size:11px; color:var(--text2); font-weight:500; text-transform:uppercase; letter-spacing:0.8px; }
select, input {
  background:var(--surface2); color:var(--text); border:1px solid var(--border);
  padding:8px 12px; border-radius:6px; font-family:inherit; font-size:13px;
  min-width:220px; outline:none; transition:border-color .2s;
}
select:focus, input:focus { border-color:var(--accent); }
select option { background:var(--surface2); }

.cards {
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
  padding:16px 32px;
}
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:16px 20px; position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.card:nth-child(1)::before { background:var(--accent); }
.card:nth-child(2)::before { background:var(--accent2); }
.card:nth-child(3)::before { background:var(--accent3); }
.card:nth-child(4)::before { background:var(--gold); }
.card .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
.card .value { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; }

.table-section {
  padding:0 32px 32px;
}
.table-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:12px; padding-top:8px;
}
.table-header h2 { font-size:15px; font-weight:600; }
.table-header .count { font-size:12px; color:var(--text2); }

.table-wrap {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  overflow:auto; max-height:65vh;
}
table { width:100%; border-collapse:collapse; font-size:12.5px; }
thead { position:sticky; top:0; z-index:2; }
thead th {
  background:var(--surface2); color:var(--text2); font-weight:600;
  text-transform:uppercase; font-size:10.5px; letter-spacing:0.6px;
  padding:10px 12px; text-align:left; border-bottom:1px solid var(--border);
  white-space:nowrap;
}
thead th.num { text-align:right; }
tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
tbody tr:hover { background:rgba(79,140,255,0.06); }
tbody td { padding:7px 12px; white-space:nowrap; }
tbody td.num {
  text-align:right; font-family:'JetBrains Mono',monospace; font-size:11.5px;
}
tbody td.pos { color:var(--green); }
tbody td.neg { color:var(--red); }
.indent { color:var(--text2); }
.row-S { font-weight:600; }
.depth-1 { background:rgba(79,140,255,0.08); }
.depth-2 td:first-child { padding-left:24px; }
.depth-3 td:first-child { padding-left:40px; }
.depth-4 td:first-child { padding-left:56px; }
.depth-5 td:first-child { padding-left:72px; }
.depth-6 td:first-child { padding-left:88px; }
.depth-7 td:first-child { padding-left:104px; }
.depth-8 td:first-child { padding-left:120px; }

.tipo-badge {
  display:inline-block; padding:1px 6px; border-radius:3px;
  font-size:10px; font-weight:600; letter-spacing:0.3px;
}
.tipo-S { background:rgba(79,140,255,0.15); color:var(--accent); }
.tipo-A { background:rgba(54,214,168,0.15); color:var(--accent2); }

.dc-D { color:var(--accent); }
.dc-C { color:var(--accent3); }

@media (max-width:900px) {
  .cards { grid-template-columns:repeat(2,1fr); }
  .controls { padding:12px 16px; }
  .table-section { padding:0 16px 16px; }
  select, input { min-width:160px; }
}

.multiselect { position:relative; }
.multiselect-trigger {
  background:var(--surface2); color:var(--text); border:1px solid var(--border);
  padding:8px 10px; border-radius:6px; font-size:13px; cursor:pointer;
  user-select:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  width:140px; transition:border-color .2s;
}
.multiselect-trigger:hover, .multiselect.open .multiselect-trigger { border-color:var(--accent); }
.multiselect-dropdown {
  display:none; position:absolute; top:calc(100% + 4px); left:0; width:420px;
  background:var(--surface2); border:1px solid var(--border); border-radius:6px;
  max-height:280px; overflow-y:auto; overflow-x:hidden; z-index:100; box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.multiselect.open .multiselect-dropdown { display:block; }
.ms-item {
  padding:7px 14px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:background .1s; white-space:nowrap;
}
.ms-item:hover { background:rgba(79,140,255,0.12); }
.ms-item input[type=checkbox] {
  accent-color:var(--accent); cursor:pointer;
  width:14px; height:14px; min-width:14px; flex-shrink:0; margin:0;
}
.ms-item.checked { color:var(--accent); }
</style>
</head>
<body>
<div class="header">
  <h1>Visão <span>Prev</span> — Consolidador de Balancetes</h1>
  <div class="badge">JANEIRO 2025</div>
</div>

<div class="controls" id="controls">
  <div class="control-group">
    <label>Consolidação</label>
    <select id="filterMode">

    </select>
  </div>
  <div class="control-group" id="planoGroup">

  <div class="control-group" id="perfilGroup">

      <div class="multiselect-trigger" id="perfilTrigger">Todos os perfis</div>

    </div>
  </div>
  <div class="control-group">
    <label>Nível Máx. Agregação</label>

      <option value="4">Até Nível 4</option>
      <option value="5">Até Nível 5</option>
      <option value="6">Até Nível 6</option>
      <option value="7">Até Nível 7</option>
    </select>
  </div>
  <div class="control-group">
    <label>Buscar Conta / Descrição</label>
    <input type="text" id="searchBox" placeholder="ex: 1.02 ou REALIZÁVEL">
  </div>
</div>



<div class="table-section">
  <div class="table-header">
    <h2 id="tableTitle">Balancete Consolidado</h2>

          <th class="num">Crédito</th>
          <th class="num">Saldo Atual</th>
          <th>D/C</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

  if (!planoPerfisMap.has(r[0])) planoPerfisMap.set(r[0], new Set());

}

// Multi-select state
const selectedPlanos = new Set();
const selectedPerfis = new Set();

// --- Generic multiselect helper ---
function buildMultiselect(dropdownEl, triggerEl, optionsEl, items, selectedSet, placeholder, onChange) {
  // Toggle open/close
  triggerEl.addEventListener('click', e => {
    e.stopPropagation();
    dropdownEl.classList.toggle('open');
  });
  document.addEventListener('click', () => dropdownEl.classList.remove('open'));

  function rebuildOptions(itemList) {
    optionsEl.innerHTML = '';
    for (const {idx, label} of itemList) {
      const div = document.createElement('div');
      div.className = 'ms-item' + (selectedSet.has(idx) ? ' checked' : '');
      div.dataset.idx = idx;
      div.innerHTML = `<input type="checkbox" ${selectedSet.has(idx)?'checked':''}> <span>${label}</span>`;
      div.addEventListener('click', e => {
        e.stopPropagation();
        const cb = div.querySelector('input');
        if (selectedSet.has(idx)) { selectedSet.delete(idx); div.classList.remove('checked'); cb.checked=false; }
        else { selectedSet.add(idx); div.classList.add('checked'); cb.checked=true; }
        updateTrigger();
        onChange();
      });
      optionsEl.appendChild(div);
    }
  }

  function updateTrigger() {
    if (selectedSet.size === 0) { triggerEl.textContent = placeholder; return; }
    const names = Array.from(selectedSet).map(i => items[i] || i).join(', ');
    const short = names.length > 40 ? names.slice(0,38)+'…' : names;
    triggerEl.textContent = `(${selectedSet.size}) ${short}`;
  }

  return { rebuildOptions, updateTrigger };
}

// Plano multiselect
const planoDropdownEl = document.getElementById('planoDropdown');
const planoTriggerEl  = document.getElementById('planoTrigger');
const planoOptionsEl  = document.getElementById('planoOptions');

const { rebuildOptions: rebuildPlanos, updateTrigger: updatePlanoTrigger } = buildMultiselect(
  planoDropdownEl, planoTriggerEl, planoOptionsEl,
  planos, selectedPlanos, 'Selecione planos…',
  () => { rebuildPerfisForSelectedPlanos(); render(); }
);
rebuildPlanos(planos.map((p,i)=>({idx:i, label:p})));

const perfilTriggerEl  = document.getElementById('perfilTrigger');
const perfilOptionsEl  = document.getElementById('perfilOptions');

const { rebuildOptions: rebuildPerfis, updateTrigger: updatePerfilTrigger } = buildMultiselect(
  perfilDropdownEl, perfilTriggerEl, perfilOptionsEl,
  perfis, selectedPerfis, 'Todos os perfis',
  () => { render(); }
);

function rebuildPerfisForSelectedPlanos() {
  // Determine available perfis for selected planos
  let availPerfis;
  if (selectedPlanos.size === 0) {
    availPerfis = perfis.map((p,i)=>({idx:i, label:p}));
  } else {
    const perfisSet = new Set();
    for (const pi of selectedPlanos) {
      const ps = planoPerfisMap.get(pi);
      if (ps) ps.forEach(x => perfisSet.add(x));
    }
    availPerfis = Array.from(perfisSet).sort((a,b)=>a-b).map(i=>({idx:i, label:perfis[i]}));
  }
  // Remove selected perfis that are no longer available
  for (const p of Array.from(selectedPerfis)) {
    if (!availPerfis.find(x=>x.idx===p)) selectedPerfis.delete(p);
  }
  rebuildPerfis(availPerfis);
  updatePerfilTrigger();
}

// Initial build
rebuildPerfisForSelectedPlanos();

  if (v == null || v === 0) return '-';
  return v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function getFiltered() {
  const maxD = parseInt(filterDepth.value);
  const search = searchBox.value.trim().toUpperCase();

  let filtered = allRows;

  // Always apply plano/perfil filters if something is selected
  if (selectedPlanos.size > 0) filtered = filtered.filter(r => selectedPlanos.has(r[0]));
  if (selectedPerfis.size > 0) filtered = filtered.filter(r => selectedPerfis.has(r[1]));

  filtered = filtered.filter(r => r[10] <= maxD);
  if (search) filtered = filtered.filter(r => r[2].toUpperCase().includes(search) || r[3].toUpperCase().includes(search));

  // Aggregate when there are multiple perfis or planos in the result
  const needsAgg = new Set(filtered.map(r=>r[1])).size > 1 || new Set(filtered.map(r=>r[0])).size > 1;

  if (needsAgg) {
    const map = new Map();
    for (const r of filtered) {
      const key = r[2];
      if (map.has(key)) {
        const e = map.get(key);
        e[5] += r[5]; e[6] += r[6]; e[7] += r[7]; e[8] += r[8];
      } else {
        map.set(key, [...r]);
      }
    }
    filtered = Array.from(map.values());
  }

  filtered.sort((a,b) => a[2].localeCompare(b[2]));
  return filtered;
}

function render() {
  const rows = getFiltered();

  // Cards
  let totalAnt=0, totalDeb=0, totalCred=0, totalAtual=0;
  for (const r of rows) {
    if (r[10] === 1) {
      totalAnt += r[5]; totalDeb += r[6]; totalCred += r[7]; totalAtual += r[8];
    }
  }

  // Title
  let title = 'Balancete Consolidado Geral';
  if (selectedPlanos.size === 1) {
    title = 'Plano: ' + planos[Array.from(selectedPlanos)[0]];
  } else if (selectedPlanos.size > 1) {
    title = selectedPlanos.size + ' planos selecionados';
  }
  if (selectedPerfis.size > 0) {
    title += ' · ' + selectedPerfis.size + ' perfil(is)';
  }
  document.getElementById('tableTitle').textContent = title;
  document.getElementById('rowCount').textContent = rows.length + ' contas';

  // Table
  const tbody = document.getElementById('tbody');
  const frag = document.createDocumentFragment();
  for (const r of rows) {
    const tr = document.createElement('tr');
    const d = r[10];
    tr.className = (r[4]==='S'?'row-S ':'') + 'depth-'+d;
    const saldoClass = r[8] > 0 ? (r[9]==='D'?'':'pos') : (r[8]<0?'neg':'');
    tr.innerHTML = `
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td><span class="tipo-badge tipo-${r[4]}">${r[4]==='S'?'Sintética':'Analítica'}</span></td>
      <td class="num">${fmt(r[5])}</td>
      <td class="num">${fmt(r[6])}</td>
      <td class="num">${fmt(r[7])}</td>
      <td class="num ${saldoClass}">${fmt(r[8])}</td>
      <td><span class="dc-${r[9]}">${r[9]}</span></td>
    `;
    frag.appendChild(tr);
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

filterMode.addEventListener('change', render);
filterDepth.addEventListener('change', render);
let debounce;
searchBox.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(render, 250); });

render();
</script>
</body>
</html>
